name: 每日自动爬取MC Wiki数据
on:
  schedule:
    # UTC 0点 = 北京时间早上8点执行
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  scraper_task:
    runs-on: ubuntu-latest
    steps:
      # 检出完整代码
      - name: 检出仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Python配置：移除cache: pip，彻底消除文件检测报错
      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 手动安装依赖，不依赖requirements.txt
      - name: 安装爬虫依赖库
        run: |
          pip install requests beautifulsoup4 lxml

      # 运行你的爬虫脚本
      - name: 运行MC数据爬虫
        run: python scraper/fetch_minecraft_news.py

      # 自动提交更新数据
      - name: 提交更新数据
        run: |
          git config --global user.name "MC-Wiki-AutoBot"
          git config --global user.email "bot@mcwiki-demo.com"
          git add ./data/ ./logs/
          if [[ -n $(git status --porcelain) ]]; then
            git commit -m "自动更新MC Wiki数据 $(date '+%Y-%m-%d')"
            git push
          fi
